<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paediatric Drug Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;padding:10px;color:#2d3436;font-size:14px}
.container{max-width:900px;margin:0 auto}

/* Header */
.header{background:#2d3436;color:#fff;padding:16px 20px;border-radius:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:1.1em;font-weight:700}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hdr-input{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:6px 10px;color:#fff;font-size:.9em;outline:none;width:70px;text-align:center}
.hdr-input::placeholder{color:rgba(255,255,255,.5)}
.hdr-input:focus{border-color:#74b9ff}
.hdr-label{font-size:.78em;color:#b2bec3;margin-right:2px}
.hdr-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:6px 8px;color:#fff;font-size:.9em;outline:none}
.hdr-select option{color:#333}

/* Info chips */
.info-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{background:#fff;border:1px solid #dfe6e9;border-radius:20px;padding:5px 14px;font-size:.82em;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chip.age{color:#6c5ce7}
.chip.pct{color:#e17055}
.chip.temp{color:#d63031}
.chip.wt{color:#00b894}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.82em;font-weight:600;background:#dfe6e9;color:#636e72;transition:all .15s;border:none}
.tab:hover{background:#b2bec3;color:#fff}
.tab.active{background:#fff;color:#2d3436;box-shadow:0 -2px 6px rgba(0,0,0,.06)}

/* Panel */
.panel{background:#fff;border-radius:0 8px 12px 12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px;min-height:200px}

/* Drug table */
.dtable{width:100%;border-collapse:collapse}
.dtable th{text-align:left;font-size:.72em;text-transform:uppercase;color:#b2bec3;padding:6px 8px;border-bottom:2px solid #f0f0f0;letter-spacing:.3px}
.dtable td{padding:8px;border-bottom:1px solid #f8f8f8;vertical-align:middle}
.dtable tr:hover{background:#fafbfc}
.drug-name{font-weight:700;font-size:.9em}
.drug-note{color:#b2bec3;font-size:.75em;margin-top:2px}
.form-select{padding:4px 8px;border:1px solid #dfe6e9;border-radius:5px;font-size:.82em;background:#fff;cursor:pointer;max-width:180px}
.dose-val{font-weight:700;color:#0984e3;font-size:.95em;white-space:nowrap}
.vol-val{font-weight:700;color:#d63031;font-size:.95em;white-space:nowrap}
.freq-val{color:#636e72;font-size:.85em;white-space:nowrap}
.capped{background:#fff9e6}
.max-badge{background:#fdcb6e;color:#2d3436;font-size:.65em;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}

/* Paracetamol highlight */
.pcm-box{background:linear-gradient(135deg,#fff9e6,#ffeaa7);border:1px solid #fdcb6e;border-radius:10px;padding:14px 18px;margin-bottom:14px}
.pcm-title{font-weight:700;font-size:.95em;margin-bottom:8px;color:#2d3436}
.pcm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcm-option{background:#fff;border-radius:8px;padding:10px 14px;border:2px solid #dfe6e9;position:relative}
.pcm-option.winner{border-color:#00b894;background:#f0fff4}
.pcm-option .badge{position:absolute;top:-8px;right:10px;background:#00b894;color:#fff;font-size:.65em;padding:2px 8px;border-radius:10px;font-weight:700}
.pcm-option h4{font-size:.8em;color:#636e72;margin-bottom:4px}
.pcm-option .big{font-size:1.1em;font-weight:700;color:#2d3436}
.pcm-option .sub{font-size:.78em;color:#636e72;margin-top:3px}
.pcm-form{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pcm-form label{font-size:.8em;font-weight:600;color:#636e72}

/* Fluid */
.fluid-box{display:grid;grid-template-columns:auto repeat(3,1fr);gap:1px;background:#dfe6e9;border-radius:8px;overflow:hidden;font-size:.85em}
.fluid-box>div{background:#fff;padding:8px 12px;text-align:center}
.fluid-box .fh{background:#f8f9fa;font-weight:700;font-size:.75em;color:#636e72;text-transform:uppercase}
.fluid-box .fl{text-align:left;font-weight:600;font-size:.85em}
.fluid-box .fv{font-weight:700;color:#0984e3}

/* Disclaimer */
.disc{background:#ffeaa7;border-radius:8px;padding:12px 16px;font-size:.75em;color:#636e72;margin-top:12px}

.btn-clear{background:#dfe6e9;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:.78em;font-weight:600;color:#636e72}
.btn-clear:hover{background:#b2bec3;color:#fff}

@media(max-width:600px){
    .pcm-grid{grid-template-columns:1fr}
    .header{flex-direction:column;align-items:flex-start}
    .tab{padding:7px 10px;font-size:.75em}
    .dtable{font-size:.82em}
    .form-select{max-width:140px;font-size:.75em}
}
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="header">
    <h1>🧒 Paed Drug Calculator</h1>
    <div class="header-right">
        <span class="hdr-label">Wt</span><input type="number" id="wt" class="hdr-input" placeholder="kg" step="0.1" min="0.5" max="100">
        <span class="hdr-label">DOB</span>
        <input type="number" id="dob-y" class="hdr-input" placeholder="YYYY" style="width:58px">
        <input type="number" id="dob-m" class="hdr-input" placeholder="MM" style="width:42px">
        <input type="number" id="dob-d" class="hdr-input" placeholder="DD" style="width:42px">
        <select id="gender" class="hdr-select"><option value="M">♂</option><option value="F">♀</option></select>
        <span class="hdr-label">°F</span><input type="number" id="temp-f" class="hdr-input" placeholder="°F" step="0.1">
        <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
</div>

<!-- Info bar -->
<div class="info-bar" id="infoBar"></div>

<!-- Tabs -->
<div class="tabs" id="tabBar"></div>

<!-- Panel -->
<div class="panel" id="mainPanel"></div>

<div class="disc">⚠️ <strong>Disclaimer:</strong> For clinical reference only. All doses are general recommendations. Adjust per patient condition, renal/hepatic function, drug interactions, and latest BNFc/UpToDate guidelines. Growth percentile based on WHO standards (0–120 months).</div>
</div>

<script>
// ============ Growth Data (WHO LMS Weight-for-Age) ============
const growthData={M:[[0,.3487,3.3464,.14602],[1,.2297,4.4709,.13395],[2,.197,5.5675,.12385],[3,.1738,6.3762,.11727],[4,.1553,7.0023,.11316],[5,.1395,7.5105,.1108],[6,.1257,7.934,.10958],[9,.0956,8.964,.10714],[12,.0693,9.6479,.10591],[15,.0437,10.306,.10523],[18,.019,10.917,.10499],[21,-.005,11.487,.10513],[24,-.028,12.022,.10559],[30,-.073,13.014,.10715],[36,-.113,13.929,.10923],[42,-.148,14.808,.11158],[48,-.178,15.672,.11406],[54,-.202,16.547,.1167],[60,-.221,17.447,.11949],[72,-.246,19.365,.12581],[84,-.254,21.518,.13371],[96,-.247,24.009,.14391],[108,-.224,27.018,.15535],[120,-.186,30.643,.1669]],F:[[0,.3809,3.2322,.14171],[1,.1714,4.1873,.13724],[2,.0962,5.1282,.13],[3,.0402,5.8458,.12619],[4,-.005,6.4237,.12402],[5,-.043,6.8985,.12274],[6,-.068,7.297,.12204],[9,-.101,8.2,.12088],[12,-.11,8.948,.12055],[15,-.107,9.617,.12066],[18,-.098,10.245,.12108],[21,-.085,10.849,.12177],[24,-.069,11.438,.12269],[30,-.034,12.577,.12509],[36,-.001,13.679,.12801],[42,.031,14.777,.13129],[48,.059,15.878,.13483],[54,.084,16.982,.13866],[60,.106,18.112,.14299],[72,.138,20.515,.15317],[84,.155,23.244,.16545],[96,.158,26.454,.17958],[108,.149,30.313,.1935],[120,.131,34.715,.20684]]};

function interpLMS(data,age){if(age<=data[0][0])return{L:data[0][1],M:data[0][2],S:data[0][3]};if(age>=data[data.length-1][0])return{L:data[data.length-1][1],M:data[data.length-1][2],S:data[data.length-1][3]};for(let i=0;i<data.length-1;i++){if(age>=data[i][0]&&age<=data[i+1][0]){const t=(age-data[i][0])/(data[i+1][0]-data[i][0]);return{L:data[i][1]+t*(data[i+1][1]-data[i][1]),M:data[i][2]+t*(data[i+1][2]-data[i][2]),S:data[i][3]+t*(data[i+1][3]-data[i][3])}}}}
function zScore(v,L,M,S){return L!==0?(Math.pow(v/M,L)-1)/(L*S):Math.log(v/M)/S}
function normCDF(z){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;const s=z<0?-1:1;const x=Math.abs(z)/Math.sqrt(2);const t=1/(1+p*x);const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return .5*(1+s*y)}
function getPercentile(wt,ageMo,gender){if(ageMo<0||ageMo>120)return null;const lms=interpLMS(growthData[gender],ageMo);const z=zScore(wt,lms.L,lms.M,lms.S);return{pct:Math.round(normCDF(z)*1000)/10,z:Math.round(z*100)/100}}

// ============ Utility ============
function roundHalf(v){return Math.round(v*2)/2}
function getWt(){return parseFloat(document.getElementById('wt').value)||0}
function getAgeMo(){const y=parseInt(document.getElementById('dob-y').value),m=parseInt(document.getElementById('dob-m').value),d=parseInt(document.getElementById('dob-d').value);if(!y||!m||!d)return null;const dob=new Date(y,m-1,d),now=new Date();if(dob>now)return null;let mo=(now.getFullYear()-dob.getFullYear())*12+(now.getMonth()-dob.getMonth());if(now.getDate()<dob.getDate())mo--;return Math.max(0,mo)}

// ============ Drug Database ============
const drugs = {
analgesics: [
    {name:'Ibuprofen (Brufen)',forms:[{l:'Syr 100mg/5ml',c:20,t:'syr'}],dose:10,freq:'TDS',maxD:400,note:'Max 40mg/kg/day; avoid if dehydrated'},
    {name:'Diclofenac (Voltaren)',forms:[{l:'Supp 12.5mg',c:12.5,t:'supp'},{l:'Supp 25mg',c:25,t:'supp'}],dose:1,freq:'TDS',maxD:50,note:'Max 3mg/kg/day; ≥1y'},
    {name:'Mefenamic Acid',forms:[{l:'Syr 50mg/5ml',c:10,t:'syr'}],dose:6.5,freq:'TDS',maxD:500,note:''},
],
antibiotics: [
    {name:'Amoxicillin',forms:[{l:'Syr 125mg/5ml',c:25,t:'syr'},{l:'Syr 250mg/5ml',c:50,t:'syr'},{l:'Cap 250mg',c:250,t:'cap'},{l:'Cap 500mg',c:500,t:'cap'}],dose:15,freq:'TDS',maxD:500,note:'Standard: 25-50mg/kg/day ÷ TDS'},
    {name:'Amoxicillin (High-dose)',forms:[{l:'Syr 250mg/5ml',c:50,t:'syr'},{l:'Cap 500mg',c:500,t:'cap'}],dose:30,freq:'TDS',maxD:1000,note:'80-90mg/kg/day; AOM/sinusitis'},
    {name:'Augmentin',forms:[{l:'Syr 156 (125/31)/5ml',c:25,t:'syr'},{l:'Syr 312 (250/62)/5ml',c:50,t:'syr'},{l:'Syr 457 (400/57)/5ml BD',c:80,t:'syr',freqOverride:'BD'},{l:'Tab 375',c:250,t:'tab'},{l:'Tab 1000 (875/125)',c:875,t:'tab',freqOverride:'BD'}],dose:15,freq:'TDS',maxD:500,note:'Dose based on amoxicillin component'},
    {name:'Cefuroxime (Zinnat)',forms:[{l:'Syr 125mg/5ml',c:25,t:'syr'},{l:'Tab 250mg',c:250,t:'tab'}],dose:15,freq:'BD',maxD:500,note:''},
    {name:'Cephalexin',forms:[{l:'Syr 125mg/5ml',c:25,t:'syr'},{l:'Syr 250mg/5ml',c:50,t:'syr'}],dose:12.5,freq:'QID',maxD:500,note:'25-50mg/kg/day'},
    {name:'Azithromycin',forms:[{l:'Syr 200mg/5ml',c:40,t:'syr'}],dose:10,freq:'DAILY',maxD:500,note:'Day1: 10mg/kg; Day2-5: 5mg/kg'},
    {name:'Clarithromycin',forms:[{l:'Syr 125mg/5ml',c:25,t:'syr'},{l:'Tab 250mg',c:250,t:'tab'}],dose:7.5,freq:'BD',maxD:500,note:''},
    {name:'Erythromycin',forms:[{l:'Syr 125mg/5ml',c:25,t:'syr'}],dose:12.5,freq:'QID',maxD:500,note:'40-50mg/kg/day'},
    {name:'Doxycycline',forms:[{l:'Cap 100mg',c:100,t:'cap'}],dose:2,freq:'BD',maxD:100,note:'≥8y only'},
    {name:'Co-trimoxazole (Septrin)',forms:[{l:'Susp 240mg/5ml',c:48,t:'syr'},{l:'Tab 480mg',c:480,t:'tab'}],dose:24,freq:'BD',maxD:960,note:'Dose = total TMP+SMX'},
    {name:'Metronidazole',forms:[{l:'Susp 200mg/5ml',c:40,t:'syr'}],dose:7.5,freq:'TDS',maxD:400,note:''},
],
antivirals: [
    {name:'Oseltamivir (Tamiflu)',forms:[{l:'Susp 6mg/ml',c:6,t:'syr'},{l:'Cap 75mg',c:75,t:'cap'}],custom:'tamiflu',freq:'BD × 5 days',note:'Tx dose; Prophylaxis = half dose OD'},
    {name:'Baloxavir (Xofluza)',forms:[{l:'Tab 20/40mg',c:0,t:'special'}],custom:'xofluza',freq:'ONCE',note:'≥12y; <80kg→40mg; ≥80kg→80mg'},
    {name:'Acyclovir',forms:[{l:'Susp 200mg/5ml',c:40,t:'syr'},{l:'Tab 200mg',c:200,t:'tab'},{l:'Tab 800mg',c:800,t:'tab'}],dose:20,freq:'5×/day (Q4H awake)',maxD:800,note:'Chickenpox 5-7 days'},
    {name:'Valaciclovir',forms:[{l:'Tab 500mg',c:500,t:'tab'}],dose:20,freq:'TDS',maxD:1000,note:'≥12y preferred'},
],
respiratory: [
    {name:'Salbutamol',forms:[{l:'Syr 2mg/5ml',c:0.4,t:'syr'}],dose:0.15,freq:'TDS-QID',maxD:4,note:''},
    {name:'Procaterol (Meptin)',forms:[{l:'Syr 5mcg/ml',c:5,t:'syr'}],dose:1.25,freq:'BD',maxD:50,note:'mcg/kg; unit=mcg',unit:'mcg'},
    {name:'Montelukast',forms:[{l:'Chew Tab 4/5/10mg',c:0,t:'special'}],custom:'montelukast',freq:'NOCTE',note:'2-5y:4mg; 6-14y:5mg; ≥15y:10mg'},
    {name:'Benadryl Expect.',forms:[{l:'Syrup (dose in ml)',c:1,t:'syr'}],dose:0.33,freq:'TDS',maxD:15,note:'Dose = 0.33ml/kg',unit:'ml'},
    {name:'Levodropropizine',forms:[{l:'Syr 60mg/10ml',c:6,t:'syr'}],dose:1,freq:'TDS',maxD:60,note:'Antitussive'},
    {name:'Dextromethorphan',forms:[{l:'Syr 3mg/5ml',c:0.6,t:'syr'}],dose:0.33,freq:'TDS',maxD:30,note:''},
    {name:'Cetirizine',forms:[{l:'Syr 5mg/5ml',c:1,t:'syr'},{l:'Tab 10mg',c:10,t:'tab'}],custom:'cetirizine',freq:'DAILY',note:'2-5y:2.5-5mg; ≥6y:10mg'},
    {name:'Chlorpheniramine (Piriton)',forms:[{l:'Syr 2mg/5ml',c:0.4,t:'syr'},{l:'Inj 10mg/ml IM',c:10,t:'syr',freqOverride:'STAT IM'}],dose:0.1,freq:'TDS',maxD:4,note:'IM: 0.2mg/kg STAT'},
    {name:'Bilastine',forms:[{l:'Tab 10/20mg',c:0,t:'special'}],custom:'bilastine',freq:'DAILY',note:'6-11y & ≥20kg:10mg; ≥12y:20mg'},
    {name:'Desloratadine',forms:[{l:'Syr 0.5mg/ml',c:0.5,t:'syr'}],custom:'desloratadine',freq:'DAILY',note:'1-5y:1.25mg; 6-11y:2.5mg; ≥12y:5mg'},
],
gi: [
    {name:'Domperidone',forms:[{l:'Syr 5mg/5ml',c:1,t:'syr'}],dose:0.25,freq:'TDS ac',maxD:10,note:'Max 0.75mg/kg/day'},
    {name:'Dimenhydrinate (Gravol)',forms:[{l:'Syr 12.5mg/5ml PO',c:2.5,t:'syr'},{l:'Supp 12.5/25mg PR',c:25,t:'supp'}],dose:1.25,freq:'TDS',maxD:50,note:''},
    {name:'Ondansetron (Zofran)',forms:[{l:'Syr 4mg/5ml',c:0.8,t:'syr'},{l:'Tab 4mg',c:4,t:'tab'}],dose:0.15,freq:'BD-TDS',maxD:4,note:''},
    {name:'Hyoscine (Buscopan)',forms:[{l:'Syr 5mg/5ml PO',c:1,t:'syr'},{l:'Inj 20mg/ml IM',c:20,t:'syr',freqOverride:'STAT IM'}],dose:0.3,freq:'TDS',maxD:20,note:'≥6y'},
    {name:'Lactulose',forms:[{l:'Syr 3.35g/5ml',c:0,t:'special'}],custom:'lactulose',freq:'DAILY-BD',note:'<1y:2.5ml; 1-5y:5ml; 5-10y:10ml; >10y:15ml'},
    {name:'Ranitidine',forms:[{l:'Syr 75mg/5ml',c:15,t:'syr'}],dose:2,freq:'BD',maxD:150,note:''},
]
};

// ============ Custom Drug Logic ============
function calcCustom(key, wt, ageMo, formIdx) {
    switch(key) {
        case 'tamiflu': {
            let d = wt<=15?30:wt<=23?45:wt<=40?60:75;
            return {mg:d};
        }
        case 'xofluza': {
            let d = wt<80?40:80;
            return {mg:d, display:d+'mg', noVol:true};
        }
        case 'montelukast': {
            let d=4;
            if(ageMo!==null){d=ageMo<72?4:ageMo<180?5:10;}
            else{d=wt<20?4:wt<40?5:10;}
            return {mg:d, display:d+'mg tab', noVol:true};
        }
        case 'cetirizine': {
            let d=10;
            if(ageMo!==null){d=ageMo<24?2.5:ageMo<72?5:10;}
            else{d=wt<12?2.5:wt<20?5:10;}
            return {mg:d};
        }
        case 'bilastine': {
            let d=(ageMo!==null&&ageMo>=144)?20:10;
            return {mg:d, display:d+'mg tab', noVol:true};
        }
        case 'desloratadine': {
            let d=5;
            if(ageMo!==null){d=ageMo<=72?1.25:ageMo<=144?2.5:5;}
            else{d=wt<=15?1.25:wt<=30?2.5:5;}
            return {mg:d};
        }
        case 'lactulose': {
            let d=15;
            if(ageMo!==null){d=ageMo<12?2.5:ageMo<60?5:ageMo<120?10:15;}
            else{d=wt<10?2.5:wt<18?5:wt<30?10:15;}
            return {mg:0, display:d+' ml', noVol:true};
        }
    }
    return null;
}

// ============ Paracetamol Logic ============
function calcPCM(wt, formIdx) {
    if(!wt) return null;
    const pcmForms = [
        {l:'Syr 120mg/5ml',c:24,t:'syr'},
        {l:'Syr 250mg/5ml',c:50,t:'syr'},
        {l:'Chew Tab 120mg',c:120,t:'tab'},
        {l:'Tab 500mg',c:500,t:'tab'},
        {l:'Supp 125mg',c:125,t:'supp'},
        {l:'Supp 250mg',c:250,t:'supp'},
        {l:'Supp 500mg',c:500,t:'supp'},
    ];
    const form = pcmForms[formIdx] || pcmForms[0];
    const dailyMax = Math.min(75*wt, 4000);
    const singleMax = 1000;

    // Q4H = 6 doses/day
    let q4h_per = Math.min(dailyMax/6, singleMax);
    let q4h_daily = q4h_per * 6;

    // Q6H = 4 doses/day
    let q6h_per = Math.min(15*wt, dailyMax/4, singleMax);
    let q6h_daily = q6h_per * 4;

    function volFor(mg, f) {
        if(f.t==='syr') return roundHalf(mg/f.c) + ' ml';
        if(f.t==='tab') { let n=Math.round(mg/f.c*4)/4; return n + ' tab'+(n!==1?'s':''); }
        if(f.t==='supp') { let n=Math.round(mg/f.c); if(n<1)n=1; return n+' supp ('+n*f.c+'mg)'; }
        return '';
    }

    return {
        q4h: {per: Math.round(q4h_per*10)/10, daily: Math.round(q4h_daily), vol: volFor(q4h_per, form)},
        q6h: {per: Math.round(q6h_per*10)/10, daily: Math.round(q6h_daily), vol: volFor(q6h_per, form)},
        winner: q4h_daily >= q6h_daily ? 'q4h' : 'q6h',
        dailyMax: Math.round(dailyMax),
        form, forms: pcmForms
    };
}

// ============ Normal Drug Calc ============
function calcDrug(drug, wt, ageMo, formIdx) {
    if(!wt) return {dose:'—',vol:'—',freq:drug.freq,capped:false};
    const form = drug.forms[formIdx] || drug.forms[0];
    const freq = form.freqOverride || drug.freq;

    if(drug.custom) {
        const c = calcCustom(drug.custom, wt, ageMo, formIdx);
        if(!c) return {dose:'—',vol:'—',freq,capped:false};
        if(c.noVol) return {dose:c.display||c.mg+'mg',vol:'—',freq,capped:false};
        let mg = c.mg;
        let vol = '';
        if(form.t==='syr'){vol=roundHalf(mg/form.c)+' ml';}
        else if(form.t==='tab'||form.t==='cap'){let n=Math.round(mg/form.c*4)/4;vol=n+' tab'+(n!==1?'s':'');}
        return {dose:mg+(drug.unit==='mcg'?' mcg':' mg'),vol,freq,capped:false};
    }

    let rawMg = drug.dose * wt;
    let capped = rawMg > drug.maxD;
    let mg = Math.min(rawMg, drug.maxD);
    mg = Math.round(mg*10)/10;

    let vol='';
    const u = drug.unit||'mg';
    if(form.t==='syr'){
        if(u==='ml'){vol=roundHalf(mg)+' ml';}
        else{vol=roundHalf(mg/form.c)+' ml';}
    } else if(form.t==='tab'||form.t==='cap'){
        let n=Math.round(mg/form.c*4)/4; vol=n+' tab'+(n!==1?'s':'');
    } else if(form.t==='supp'){
        let n=Math.round(mg/form.c);if(n<1)n=1;mg=n*form.c;vol=n+' supp';capped=mg>drug.maxD;
    }

    return {dose:mg+' '+u,vol,freq,capped};
}

// ============ Tab Setup ============
const tabDefs = [
    {id:'analgesics',label:'Analgesics'},
    {id:'antibiotics',label:'Antibiotics'},
    {id:'antivirals',label:'Antivirals'},
    {id:'respiratory',label:'Respiratory'},
    {id:'gi',label:'GI'},
    {id:'fluids',label:'Fluids'}
];

let activeTab = 'analgesics';
let formSelections = {}; // drugKey -> formIdx
let pcmFormIdx = 1; // default to 250mg/5ml

function switchTab(id){activeTab=id;render()}

// ============ Render ============
function render() {
    renderInfo();
    renderTabs();
    renderPanel();
}

function renderTabs(){
    document.getElementById('tabBar').innerHTML=tabDefs.map(t=>`<button class="tab${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');
}

function renderInfo(){
    const wt=getWt(),ageMo=getAgeMo(),gender=document.getElementById('gender').value;
    const tempF=parseFloat(document.getElementById('temp-f').value);
    let html='';
    if(wt)html+=`<span class="chip wt">⚖️ ${wt} kg</span>`;
    if(ageMo!==null){
        const y=Math.floor(ageMo/12),m=Math.round(ageMo%12);
        html+=`<span class="chip age">📅 ${y}y${m}m</span>`;
        if(wt&&ageMo<=120){
            const p=getPercentile(wt,ageMo,gender);
            if(p)html+=`<span class="chip pct">📊 P${p.pct} (Z=${p.z})</span>`;
        }
    }
    if(!isNaN(tempF)){
        const c=((tempF-32)*5/9).toFixed(1);
        const color=c>=38?'#d63031':c>=37.5?'#e17055':'#00b894';
        html+=`<span class="chip temp" style="color:${color}">🌡️ ${c}°C</span>`;
    }
    document.getElementById('infoBar').innerHTML=html;
}

function renderPanel(){
    const panel=document.getElementById('mainPanel');
    if(activeTab==='fluids'){renderFluids(panel);return;}
    const wt=getWt(),ageMo=getAgeMo();
    let html='';

    // Paracetamol box (only in analgesics tab)
    if(activeTab==='analgesics'){
        html+=renderPCM(wt);
    }

    // Drug table
    const list=drugs[activeTab];
    if(!list||!list.length){panel.innerHTML=html||'<p style="color:#b2bec3;text-align:center;padding:40px">No drugs in this category</p>';return;}

    html+=`<table class="dtable"><thead><tr><th>Drug</th><th>Formulation</th><th>Per Dose</th><th>Volume / Amount</th><th>Frequency</th></tr></thead><tbody>`;

    list.forEach((drug,di)=>{
        const key=activeTab+'_'+di;
        const fi=formSelections[key]||0;
        const r=calcDrug(drug,wt,ageMo,fi);

        let formOpts=drug.forms.map((f,i)=>`<option value="${i}"${i===fi?' selected':''}>${f.l}</option>`).join('');
        let formHtml=drug.forms.length>1?`<select class="form-select" onchange="formSelections['${key}']=parseInt(this.value);render()">${formOpts}</select>`:`<span style="font-size:.82em;color:#636e72">${drug.forms[0].l}</span>`;

        html+=`<tr${r.capped?' class="capped"':''}>
            <td><div class="drug-name">${drug.name}</div>${drug.note?'<div class="drug-note">'+drug.note+'</div>':''}</td>
            <td>${formHtml}</td>
            <td class="dose-val">${r.dose}${r.capped?'<span class="max-badge">MAX</span>':''}</td>
            <td class="vol-val">${r.vol}</td>
            <td class="freq-val">${r.freq}</td>
        </tr>`;
    });

    html+=`</tbody></table>`;
    panel.innerHTML=html;
}

function renderPCM(wt){
    const pcm=calcPCM(wt,pcmFormIdx);
    if(!pcm) return `<div class="pcm-box"><div class="pcm-title">Paracetamol (Panadol)</div><p style="color:#b2bec3;font-size:.85em">Enter weight to calculate</p></div>`;

    const w=pcm.winner;
    const q4=pcm.q4h, q6=pcm.q6h;

    let formOpts=pcm.forms.map((f,i)=>`<option value="${i}"${i===pcmFormIdx?' selected':''}>${f.l}</option>`).join('');

    return `<div class="pcm-box">
        <div class="pcm-title">Paracetamol (Panadol) — Max safe daily: ${pcm.dailyMax} mg/day</div>
        <div class="pcm-grid">
            <div class="pcm-option${w==='q4h'?' winner':''}">
                ${w==='q4h'?'<div class="badge">✓ RECOMMENDED</div>':''}
                <h4>Q4H (6 doses/day)</h4>
                <div class="big">${q4.per} mg × 6 = ${q4.daily} mg/day</div>
                <div class="sub">${q4.vol} per dose</div>
            </div>
            <div class="pcm-option${w==='q6h'?' winner':''}">
                ${w==='q6h'?'<div class="badge">✓ RECOMMENDED</div>':''}
                <h4>Q6H (4 doses/day)</h4>
                <div class="big">${q6.per} mg × 4 = ${q6.daily} mg/day</div>
                <div class="sub">${q6.vol} per dose</div>
            </div>
        </div>
        <div class="pcm-form">
            <label>Formulation:</label>
            <select class="form-select" onchange="pcmFormIdx=parseInt(this.value);render()">${formOpts}</select>
            <span style="font-size:.75em;color:#636e72">15mg/kg/dose max · 75mg/kg/day max · 4g/day absolute max</span>
        </div>
    </div>`;
}

function renderFluids(panel){
    const wt=getWt();
    if(!wt){panel.innerHTML='<p style="color:#b2bec3;text-align:center;padding:40px">Enter weight to calculate fluids</p>';return;}
    let daily;
    if(wt<=10)daily=wt*100;else if(wt<=20)daily=1000+(wt-10)*50;else daily=1500+(wt-20)*20;
    const bolus=20*wt;

    const rows=[{l:'Maintenance',m:1},{l:'Maint × 1.25',m:1.25},{l:'Maint × 1.5',m:1.5}];

    let html=`<div style="margin-bottom:12px;font-size:.85em;color:#636e72"><strong>Holliday-Segar</strong> · Daily: <strong>${Math.round(daily)} ml</strong> · Bolus (20ml/kg): <strong>${Math.round(bolus)} ml</strong></div>`;
    html+=`<div class="fluid-box">
        <div class="fh"></div><div class="fh">No Bolus</div><div class="fh">+ Bolus ×1</div><div class="fh">+ Bolus ×2</div>`;
    rows.forEach(r=>{
        const d=daily*r.m;
        html+=`<div class="fl">${r.l}</div>
            <div class="fv">${Math.round(d/24)} ml/hr</div>
            <div class="fv">${Math.round((d+bolus)/24)} ml/hr</div>
            <div class="fv">${Math.round((d+bolus*2)/24)} ml/hr</div>`;
    });
    html+=`</div>`;
    panel.innerHTML=html;
}

// ============ Auto-recommend formulation ============
function autoRecommend(){
    const wt=getWt(),ageMo=getAgeMo();
    if(!wt)return;

    // PCM: pick best formulation
    if(wt>=25) pcmFormIdx=1; // 250mg/5ml
    else pcmFormIdx=0; // 120mg/5ml
    if(ageMo!==null && ageMo>=72 && wt>=20) pcmFormIdx=3; // Tab 500 for >6y and decent weight

    // For each drug category, auto-pick best formulation
    Object.keys(drugs).forEach(cat=>{
        drugs[cat].forEach((drug,di)=>{
            if(drug.forms.length<=1)return;
            const key=cat+'_'+di;
            // Prefer syrups for young/light, tabs for older/heavier
            if(ageMo!==null && ageMo>=72 && wt>=20){
                // Try to find a tab/cap
                const tabIdx=drug.forms.findIndex(f=>f.t==='tab'||f.t==='cap');
                if(tabIdx>=0){formSelections[key]=tabIdx;return;}
            }
            // For syrups: prefer higher concentration if dose is large
            const dose=drug.dose*wt;
            let bestIdx=0,bestVol=999;
            drug.forms.forEach((f,i)=>{
                if(f.t==='syr'){
                    const vol=dose/f.c;
                    if(vol>=1&&vol<=15&&vol<bestVol){bestVol=vol;bestIdx=i;}
                }
            });
            formSelections[key]=bestIdx;
        });
    });
}

// ============ Events ============
function clearAll(){
    ['wt','dob-y','dob-m','dob-d','temp-f'].forEach(id=>document.getElementById(id).value='');
    formSelections={};pcmFormIdx=1;render();
    try{localStorage.removeItem('paedCalc2')}catch(e){}
}

function onInput(){
    autoRecommend();
    render();
    try{localStorage.setItem('paedCalc2',JSON.stringify({wt:document.getElementById('wt').value,dy:document.getElementById('dob-y').value,dm:document.getElementById('dob-m').value,dd:document.getElementById('dob-d').value,g:document.getElementById('gender').value,tf:document.getElementById('temp-f').value}))}catch(e){}
}

function loadSaved(){
    try{
        const d=JSON.parse(localStorage.getItem('paedCalc2'));
        if(!d)return;
        if(d.wt)document.getElementById('wt').value=d.wt;
        if(d.dy)document.getElementById('dob-y').value=d.dy;
        if(d.dm)document.getElementById('dob-m').value=d.dm;
        if(d.dd)document.getElementById('dob-d').value=d.dd;
        if(d.g)document.getElementById('gender').value=d.g;
        if(d.tf)document.getElementById('temp-f').value=d.tf;
    }catch(e){}
}

document.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',onInput));

loadSaved();
autoRecommend();
render();
</script>
